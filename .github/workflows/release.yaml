name: Release

on:
  push:

permissions:
  contents: write # Needed to upload artifacts to the release
  # id-token: write # Needed for OIDC PyPI publishing
  packages: write
  attestations: write
jobs:
  build:
    name: Build Wheel and SDist
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.baipp.outputs.package_name }}
      version: ${{ steps.baipp.outputs.package_version }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
        id: baipp

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag(s)
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "extra_tag=" >> $GITHUB_OUTPUT
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "extra_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ steps.vars.outputs.tag }} .
          if [ -n "${{ steps.vars.outputs.extra_tag }}" ]; then
            docker tag $IMAGE:${{ steps.vars.outputs.tag }} $IMAGE:${{ steps.vars.outputs.extra_tag }}
          fi

      - name: Push Docker image(s)
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker push $IMAGE:${{ steps.vars.outputs.tag }}
          if [ -n "${{ steps.vars.outputs.extra_tag }}" ]; then
            docker push $IMAGE:${{ steps.vars.outputs.extra_tag }}
          fi
