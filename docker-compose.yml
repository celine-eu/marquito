services:
  db:
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_DB: marquito
      POSTGRES_USER: marquito
      POSTGRES_PASSWORD: marquito
    ports:
      - "45432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquito"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      MARQUITO_DB_HOST: db
      MARQUITO_DB_PORT: 5432
      MARQUITO_DB_NAME: marquito
      MARQUITO_DB_USER: marquito
      MARQUITO_DB_PASSWORD: marquito
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    environment:
      MARQUITO_DB_HOST: db
      MARQUITO_DB_PORT: 5432
      MARQUITO_DB_NAME: marquito
      MARQUITO_DB_USER: marquito
      MARQUITO_DB_PASSWORD: marquito
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
